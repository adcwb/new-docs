# ============================================================================
# Knowledge Atlas — 星图数据源 (single source of truth)
# 供三处共用：首页星座 Hero、星表目录、内页 --page-accent 注入。
#   - domains: 11 个技术领域（按 content/docs 下 _index.md 的 weight 排序）。
#     · key     程序内标识，也用于 edges 互连
#     · dir     content/docs 下真实目录名，用于 URL 推导与笔记计数匹配
#     · hue     该领域色相（地图上的「疆域色」）
#     · x / y   星座坐标，落在 viewBox "0 0 100 56" 上，按语义聚类手工摆放：
#               数据簇(左) python·data·db | Web/服务簇(中) web·php·golang
#               系统/基础设施簇(右) rust·linux·cloud·network·security
#   - edges: 领域间的真实知识关联（星座连线），每条是一对 key。
# 笔记计数在构建时实时取得，不在此硬编码。
# ============================================================================
domains:
  - { key: python,   dir: "软件开发/Python开发", name_zh: "Python",   name_en: "Python",       hue: "#3b82f6", x: 22, y: 16, blurb_zh: "语言基础、Web 框架、自动化与工程实践", blurb_en: "Fundamentals, web frameworks, automation" }
