  en:
    label: English
    locale: en-US
    weight: 2
    title: "My Tech Blog"
    params:
      description: "Notes on tech learning and practice"
    menu:
      main:
        - name: Docs
          pageRef: /docs
          weight: 1
        - name: Search
          weight: 8
          params:
